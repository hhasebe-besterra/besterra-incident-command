<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="BESTERRA INCIDENT COMMAND">
  <defs>
    <radialGradient id="bg" cx="50%" cy="34%" r="78%">
      <stop offset="0%"  stop-color="#1d0f0a"/>
      <stop offset="48%" stop-color="#0c0b0d"/>
      <stop offset="100%" stop-color="#060607"/>
    </radialGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#ff7a2f"/>
      <stop offset="55%" stop-color="#ff5a1f"/>
      <stop offset="100%" stop-color="#e8400a"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3ff3df"/>
      <stop offset="100%" stop-color="#13b9aa"/>
    </linearGradient>
    <linearGradient id="bred" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%"  stop-color="#ff3b46"/>
      <stop offset="55%" stop-color="#e2151f"/>
      <stop offset="100%" stop-color="#c8161d"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="redglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="8" y="8" width="496" height="496" rx="104" fill="url(#bg)"/>

  <!-- outer HUD octagon (bold) -->
  <polygon points="256,56 392,108 444,256 392,404 256,456 120,404 68,256 120,108"
           fill="none" stroke="url(#orange)" stroke-width="14" filter="url(#glow)"/>

  <!-- segmented targeting ring -->
  <circle cx="256" cy="256" r="166" fill="none" stroke="url(#teal)" stroke-width="11"
          stroke-dasharray="52 44" stroke-dashoffset="12" opacity="0.92"/>

  <!-- crosshair ticks -->
  <g stroke="#ffd9b8" stroke-width="9" opacity="0.9" stroke-linecap="round">
    <line x1="256" y1="70"  x2="256" y2="112"/>
    <line x1="256" y1="400" x2="256" y2="442"/>
    <line x1="70"  y1="256" x2="112" y2="256"/>
    <line x1="400" y1="256" x2="442" y2="256"/>
  </g>

  <!-- BESTERRA brand mark (bold centerpiece) -->
  <g filter="url(#redglow)" transform="translate(212,138) scale(2.66)">
    <path fill="url(#bred)" d="M19.9,21.6c-2.8,.5-6.1,1.6-9.7,3.2V0H5.4V55.5c-1.6,1.7-3.4,3.5-5.4,5.5v27.9c.6-.8,1.3-1.5,1.9-2.3,13.9-18.4,22.1-34.2,24.2-38.8,1.8-4,3-7.5,3.8-10.5,.6-2.6,1-4.8,.9-6.8,0-3.2-.9-5.4-2.4-7-2.1-2.2-4.6-2.5-8.5-1.9m-.8,14.4c-1.5,4.2-4.1,8.7-8.9,14.3V25.4c1.7-.5,3.2-.8,4.5-.9,2.9-.1,5,.9,5.6,3.7,.3,1.9-.1,4.5-1.2,7.8"/>
  </g>

  <!-- HUD corner brackets -->
  <g stroke="url(#orange)" stroke-width="11" fill="none" stroke-linecap="square">
    <path d="M70 150 V70 H150"/>
    <path d="M442 362 V442 H362"/>
  </g>
</svg>
